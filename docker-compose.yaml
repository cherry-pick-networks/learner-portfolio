services:
  app:
    build: .
    ports:
      - "${API_PORT:-58000}:8000"
    environment:
      API_PORT: "58000"
      SQLITE_PATH: /data/learner_portfolio.db
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: "6379"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID:-}
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID:-}
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN:-}
    volumes:
      - app_data:/data
    depends_on:
      falkordb:
        condition: service_healthy

  falkordb:
    image: falkordb/falkordb:latest
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  falkordb-browser:
    image: falkordb/falkordb-browser:latest
    ports:
      - "${FALKORDB_BROWSER_PORT:-3000}:3000"
    environment:
      FALKORDB_URL: redis://falkordb:6379
    depends_on:
      falkordb:
        condition: service_healthy

volumes:
  app_data: {}
  falkordb_data: {}
